name: Publish Distribution

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show repo contents
        run: ls -R

      - name: Create dist folder
        run: mkdir -p dist

      - name: Copy userscript(s) to dist
        run: cp *.user.js dist/ || echo "No .user.js files found"

      - name: Show dist contents
        run: ls -R dist

      - name: Push to dist repo
        uses: ad-m/github-push-action@v0.6.0
        with:
          repository: downtathelast/worldwide-dead-dist
          branch: main
          github_token: ${{ secrets.DIST_REPO_TOKEN }}
          force: true
          directory: dist
