name: Publish Distribution

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Node.js (if you need build tools)
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Copy script to dist
        run: cp your-script.user.js dist/

      - name: Push to dist repo
        uses: ad-m/github-push-action@v0.6.0
        with:
          repository: downtathelast/world-wide-dead-scripts
          branch: main
          github_token: ${{ secrets.DIST_REPO_TOKEN }}
          force: true
          directory: dist
